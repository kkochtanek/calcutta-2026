<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Calcutta — Live</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f2f2;
  --white:#fff;
  --border:#ddd;
  --border2:#e8e8e8;
  --text:#111;
  --muted:#666;
  --hint:#aaa;
  --orange:#E8480A;
  --orange-bg:#fff4f0;
  --blue:#1455a4;
  --blue-bg:#eff4ff;
  --green:#16a34a;
  --green-bg:#f0fdf4;
  --purple:#7c3aed;
  --purple-bg:#f5f3ff;
  --teal:#0f766e;
  --red:#dc2626;
  --red-bg:#fef2f2;
  --gold:#b45309;
}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;-webkit-text-size-adjust:100%}
.bc{font-family:'Barlow Condensed',sans-serif}
.mono{font-family:'DM Mono',monospace}

/* ── MASTHEAD ── */
#mast{background:#111;color:#fff;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
#mast-l{display:flex;align-items:center;gap:10px}
.mast-logo{background:var(--orange);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;letter-spacing:.06em;padding:3px 10px;border-radius:3px;flex-shrink:0}
.mast-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:.04em}
.mast-sub{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
#mast-r{display:flex;align-items:center;gap:8px}
#live-dot{width:7px;height:7px;border-radius:50%;background:#444;display:inline-block;margin-right:4px}
#live-dot.on{background:#22c55e;box-shadow:0 0 7px #22c55e;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#live-label{font-size:11px;font-weight:600;letter-spacing:.06em;color:rgba(255,255,255,.45);text-transform:uppercase}
#upd{font-size:10px;color:rgba(255,255,255,.3)}
#refbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:700;font-family:'Barlow',sans-serif;letter-spacing:.05em;transition:.15s;white-space:nowrap;min-height:32px;touch-action:manipulation}
#refbtn:hover,#refbtn:active{background:var(--orange);border-color:var(--orange)}

/* ── TABS ── */
#tabs{background:var(--white);border-bottom:2px solid var(--border);display:flex;padding:0 16px}
.tab{padding:10px 18px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:.12s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.tab:hover{color:var(--text)}
.tab.on{color:var(--orange);border-bottom-color:var(--orange)}

/* ── SUMMARY STRIP ── */
#strip{background:var(--white);border-bottom:1px solid var(--border);padding:7px 16px}
.ss-bar{font-size:11px;color:var(--muted);font-weight:500}

/* ── BRACKET PAGE ── */
#bview{padding:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.bracket-scroll-hint{display:none;background:var(--orange-bg);color:var(--orange);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:7px 16px;border-bottom:1px solid #ffd5c8;text-align:center}
.bwrap{min-width:960px;background:var(--white);border:1px solid var(--border);border-radius:0;overflow:hidden;margin:0}
.b-grid{display:grid;grid-template-columns:repeat(4,1fr) 120px repeat(4,1fr)}

/* Round column */
.rcol{display:flex;flex-direction:column;border-right:1px solid var(--border)}
.rcol:last-child{border-right:none}
.rh{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;text-align:center;padding:4px;background:#f8f8f8;border-bottom:1px solid var(--border);color:var(--muted)}
.rgames{flex:1;display:flex;flex-direction:column}
.region-band{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;text-align:center;padding:3px 2px;color:#fff;border-bottom:1px solid rgba(0,0,0,.1)}
.mu{display:flex;flex-direction:column;flex:1;justify-content:center;border-bottom:1px solid var(--border2);min-height:52px}
.mu:last-child{border-bottom:none}
.mu-half{display:flex;flex-direction:column;flex:1;justify-content:center}
.ts{display:flex;align-items:center;gap:3px;padding:2px 5px;min-height:22px;cursor:default;transition:.08s;position:relative}
.ts:hover{background:rgba(0,0,0,.03)}
.ts.win{} .ts.out{opacity:.32} .ts.tbd{opacity:.22}
.ts.go{background:rgba(232,72,10,.06)}
.ts-bar{width:3px;border-radius:1px;align-self:stretch;min-height:14px;flex-shrink:0}
.ts-sd{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--hint);min-width:13px;text-align:center}
.ts-nm{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.01em}
.ts-sc{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);min-width:20px;text-align:right}
.mu-line{height:1px;background:var(--border)}
.lv{font-size:8px;font-weight:800;color:var(--orange);letter-spacing:.06em;margin-right:1px}
.rev .ts-sd{order:3;text-align:center}
.rev .ts-nm{order:2;text-align:right}
.rev .ts-sc{order:1;text-align:left;margin-right:2px}
.rev .ts-bar{order:0}
.rev .lv{order:4}
.bcenter{background:var(--white);border-left:2px solid var(--border);border-right:2px solid var(--border);display:flex;flex-direction:column;justify-content:space-between;padding:6px 4px}
.ff-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:3px}
.ff-t{display:flex;align-items:center;gap:4px;padding:4px 5px;border-radius:3px;border:1px solid var(--border2);margin-bottom:3px;min-height:26px}
.ff-tn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.champ-box{background:var(--orange);border-radius:5px;padding:8px 6px;text-align:center;margin:4px 0}
.champ-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.65)}
.champ-nm{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:.04em;color:#fff;line-height:1.1}
.champ-ow{font-size:9px;color:rgba(255,255,255,.75);margin-top:2px}
.pot-tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--muted);text-align:center;padding:3px 0;letter-spacing:.04em}
.sep{height:1px;background:var(--border);margin:3px 0}

/* ── LEADERBOARD ── */
#lview{padding:12px 14px;max-width:1200px;margin:0 auto}
.oc{background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden}
.och{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:2px solid var(--border)}
.oci{width:36px;height:36px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.ocn{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.04em}
.ocsub{font-size:11px;color:var(--muted)}
.ocrk{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:var(--border);margin-left:auto}
.ocrk.r1{color:var(--gold)}.ocrk.r2{color:#9ca3af}.ocrk.r3{color:#b45309}

/* Stats grid — desktop: 6 cols, mobile: 2x3 pill grid */
.ost{display:grid;grid-template-columns:200px repeat(4,1fr);border-bottom:1px solid var(--border)}
.osi-spacer{background:#fafafa}
.osi{padding:8px 10px;text-align:center;border-right:1px solid var(--border)}
.osi:last-child{border-right:none}
.osv{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;line-height:1}
.osl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:2px}

/* Team rows */
.team-rows{border-top:1px solid var(--border2)}
.tr-header{display:grid;grid-template-columns:200px repeat(4,1fr);padding:0;background:#fafafa;border-bottom:1px solid var(--border)}
.tr-name-h{padding:5px 10px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.tr-num-h{padding:5px 8px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);text-align:right}
.team-row{display:grid;grid-template-columns:200px repeat(4,1fr);border-bottom:1px solid var(--border2)}
.team-row:last-child{border-bottom:none}
.team-row:hover{background:rgba(0,0,0,.02)}
.tr-name{padding:6px 10px;display:flex;align-items:center;gap:5px;font-size:12px;flex-wrap:wrap;min-width:0}
.tr-num{padding:6px 8px;font-family:'DM Mono',monospace;font-size:11px;text-align:right;display:flex;align-items:center;justify-content:flex-end}

.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:3px;vertical-align:middle;flex-shrink:0}
.dot-g{background:var(--green)}.dot-r{background:var(--red)}.dot-o{background:var(--orange);animation:pulse .9s infinite}.dot-m{background:var(--hint)}
.badge{display:inline-block;padding:1px 5px;border-radius:2px;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.bg{background:#ecfdf5;color:var(--green)}.br{background:var(--red-bg);color:var(--red)}.bo{background:var(--orange-bg);color:var(--orange)}.bb{background:var(--blue-bg);color:var(--blue)}

/* Loading */
#loading{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:999}
.spin{width:32px;height:32px;border:3px solid #eee;border-top:3px solid var(--orange);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:18px;right:18px;background:#111;color:#fff;border-radius:5px;padding:7px 14px;font-size:11px;font-weight:600;transform:translateY(50px);transition:.22s;z-index:500;pointer-events:none}
#toast.show{transform:translateY(0)}

/* ══════════════════════════════════════
   MOBILE PORTRAIT — max-width: 640px
══════════════════════════════════════ */
@media(max-width:640px){
  /* Masthead */
  #mast{padding:8px 12px;gap:8px}
  .mast-title{font-size:18px}
  .mast-sub{display:none}
  #upd{display:none}
  #live-label{font-size:10px}
  #refbtn{padding:6px 10px;font-size:10px}

  /* Tabs — full width equal split */
  #tabs{padding:0;display:grid;grid-template-columns:1fr 1fr}
  .tab{text-align:center;padding:11px 8px;font-size:14px}

  /* Strip */
  #strip{padding:7px 12px}
  .ss-bar{font-size:10px}

  /* Bracket — swipeable */
  #bview{padding:0}
  .bracket-scroll-hint{display:block}
  .bwrap{border-radius:0;border-left:none;border-right:none;margin:0}

  /* Leaderboard */
  #lview{padding:10px}
  .oc{border-radius:8px;margin-bottom:10px}
  .och{padding:10px 12px;gap:8px}
  .ocn{font-size:18px}
  .ocrk{font-size:26px}

  /* All 5 stats + team rows vertically aligned.
     All three grids share the exact same template:
     col1 = name/spacer (0.7fr), cols 2-6 = the 5 stats (each 1fr) */
  .ost{grid-template-columns:0.7fr repeat(4,1fr)}
  .osi-spacer{display:block;background:#fafafa}
  .osi{padding:7px 2px;border-right:1px solid var(--border2)}
  .osi:last-child{border-right:none}
  .osv{font-size:12px}
  .osl{font-size:6.5px;letter-spacing:.02em}

  .tr-header{grid-template-columns:0.7fr repeat(4,1fr)}
  .tr-num-h{padding:4px 2px;font-size:6.5px;letter-spacing:.02em}

  .team-row{grid-template-columns:0.7fr repeat(4,1fr)}
  .tr-num{padding:5px 2px;font-size:9px}

  .tr-name{padding:6px 4px;gap:3px;font-size:11px}
  .tr-name .badge{font-size:7px;padding:1px 3px}

  /* Toast centered */
  #toast{left:50%;right:auto;transform:translateX(-50%) translateY(50px);width:calc(100% - 40px);text-align:center}
  #toast.show{transform:translateX(-50%) translateY(0)}
}

/* ══════════════════════════════════════
   TABLET — 641px–900px
══════════════════════════════════════ */
@media(min-width:641px) and (max-width:900px){
  #lview{padding:12px}
  .ost{grid-template-columns:120px repeat(4,1fr)}
  .tr-header{grid-template-columns:120px repeat(4,1fr)}
  .team-row{grid-template-columns:120px repeat(4,1fr)}
  .tr-num{font-size:10px;padding:5px 6px}
  .tr-num-h{padding:5px 6px;font-size:8px}
  .osv{font-size:16px}
  #bview{padding:0}
  .bracket-scroll-hint{display:block}
  .bwrap{border-radius:0;border-left:none;border-right:none}
}
</style>
</head>

function norm(s){return(s||'').toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim()}
function matchTeam(en){
  const raw=(en||'').toLowerCase().replace(/[^a-z0-9 &]/g,'').trim();
  if(EXCL.some(ex=>raw===ex||raw.startsWith(ex+' '))) return null;
  const enWords=norm(en).split(' ');
  let bestMatch=null, bestLen=0;
  for(const [,teams] of Object.entries(POOL)){
    for(const t of teams){
      for(const a of t.al){
        const aliasWords=norm(a).split(' ');
        // Exact match
        if(norm(a)===norm(en)) return t.n;
        // ESPN returns "Duke Blue Devils" — check if ESPN name starts with alias words in order
        if(aliasWords.length<=enWords.length &&
           aliasWords.every((w,i)=>enWords[i]===w) &&
           aliasWords.length>bestLen){
          bestLen=aliasWords.length;
          bestMatch=t.n;
        }
      }
    }
  }
  return bestMatch;
}

async function fetchESPN(){
  const nw={};let tot=0;
  console.log('[ESPN] Starting fetch for',DATES.length,'dates');
  const rs=await Promise.allSettled(
    DATES.map(d=>fetch(`/api/espn?date=${d}`).then(r=>r.ok?r.json():null).catch(()=>null))
  );
  console.log('[ESPN] Got',rs.length,'responses');
  let evCount=0;
  for(const r of rs){
    if(r.status!=='fulfilled'||!r.value?.events) continue;
    evCount+=r.value.events.length;
    for(const ev of r.value.events){
      const c=ev.competitions?.[0];
      if(!c?.competitors||c.competitors.length<2) continue;
      const done=c.status?.type?.completed;
      const live=c.status?.type?.state==='in';
      if(done) tot++;
      // Skip play-in: both map to same slot
      const mapped=c.competitors.map(x=>matchTeam(x.team?.displayName||''));
      if(mapped[0]&&mapped[0]===mapped[1]) continue;
      for(const x of c.competitors){
        const pn=matchTeam(x.team?.displayName||'');
        if(!pn){console.log('[ESPN] NO MATCH:',x.team?.displayName); continue;}
        if(!nw[pn]) nw[pn]={wins:0,eliminated:false,live:false,score:''};
        const opp=c.competitors.find(y=>y.team?.displayName!==x.team?.displayName);
        if(done){
          if(x.winner===true) nw[pn].wins++;
          else nw[pn].eliminated=true;
          nw[pn].score=`${x.score}-${opp?.score||'?'}`;
        } else if(live){
          nw[pn].live=true;
          nw[pn].score=`${x.score}-${opp?.score||'?'}`;
        }
      }
    }
  }
  console.log('[ESPN] Total events:',evCount,'Completed games:',tot,'Teams matched:',Object.keys(nw));
  W=nw; gDone=tot;
}

// ═══ EV ═══
function teamEV(n){
  const p=PR[n]||DP, st=W[n]||{wins:0,eliminated:false};
  const k=st.wins||0;
  if(st.eliminated) return{realized:PW[k]||0,rem:0};
  const base=k===0?1:([p.r1,p.r2,p.r3,p.r4,p.r5,p.r6][k-1]||.001);
  const cl=v=>Math.min(1,Math.max(0,v||0));
  const r1=cl(p.r1/base),r2=cl(p.r2/base),r3=cl(p.r3/base),
        r4=cl(p.r4/base),r5=cl(p.r5/base),r6=cl(p.r6/base);
  let ev=0;
  if(k<1)ev+=(r1-r2)*PW[1];if(k<2)ev+=(r2-r3)*PW[2];if(k<3)ev+=(r3-r4)*PW[3];
  if(k<4)ev+=(r4-r5)*PW[4];if(k<5)ev+=(r5-r6)*PW[5];ev+=r6*PW[6];
  return{realized:PW[k]||0,rem:Math.max(0,ev)};
}
function ownerStats(o){
  let inv=0,real=0,rem=0;
  for(const[,ts]of Object.entries(POOL)){for(const t of ts){
    if(t.o!==o)continue; inv+=t.p;
    const ev=teamEV(t.n); real+=ev.realized; rem+=ev.rem;
  }}
  return{inv,real,rem,net:real-inv,netEV:real+rem-inv};
}

// ═══ FORMAT ═══
function fm(n,s=false){
  const a='$'+Math.round(Math.abs(n)).toLocaleString();
  if(!s)return n<0?'-'+a:a;
  return n<0?'-'+a:'+'+a;
}
function fc(n){return n>=0?'var(--green)':'var(--red)'}

// ═══ BRACKET ═══
function gw(n){return W[n]||{wins:0,eliminated:false,live:false,score:''}}
function winner(a,b){
  if(!a||!b||a.n==='?'||b.n==='?') return null;
  const sa=gw(a.n),sb=gw(b.n);
  if(sa.eliminated&&!sb.eliminated)return b;
  if(sb.eliminated&&!sa.eliminated)return a;
  return null;
}

function tSlot(t,rev=false){
  if(!t||t.n==='?')return`<div class="ts tbd${rev?' rev':''}"><span class="ts-bar" style="background:#eee"></span><span class="ts-sd">?</span><span class="ts-nm" style="color:#ccc">TBD</span></div>`;
  const st=gw(t.n);
  const elim=st.eliminated, live=st.live;
  const color=t.o?oc(t.o):'#ddd';
  const cls='ts'+(elim?' out':live?' go':'')+(rev?' rev':'');
  const sc=st.score?`<span class="ts-sc">${st.score}</span>`:'';
  const lv=live?`<span class="lv">●</span>`:'';
  return`<div class="${cls}" title="${t.o||'No owner'} · $${t.p}">
    <span class="ts-bar" style="background:${color}"></span>
    <span class="ts-sd">${t.s}</span>
    <span class="ts-nm" style="color:${t.o?color:'#bbb'}">${t.n}</span>
    ${lv}${sc}
  </div>`;
}

function muPair(a,b,rev=false){
  return`<div class="mu">${tSlot(a,rev)}<div class="mu-line"></div>${tSlot(b,rev)}</div>`;
}
function muSingle(t,rev=false){
  return`<div class="mu">${tSlot(t,rev)}</div>`;
}

function advRound(pairs){
  return pairs.map(([a,b])=>winner(a,b)||{n:'?',s:'?',o:null,p:0,al:[]});
}

function buildRegion(reg){
  const teams=POOL[reg];
  // Traditional seed order: top half 1,16,8,9,5,12,4,13 | bottom half 6,11,3,14,7,10,2,15
  const SO=[1,16,8,9,5,12,4,13,6,11,3,14,7,10,2,15];
  const by=SO.map(s=>teams.find(t=>t.s===s)||{n:'?',s,o:null,p:0,al:[]});
  const r64=[[by[0],by[1]],[by[2],by[3]],[by[4],by[5]],[by[6],by[7]],
              [by[8],by[9]],[by[10],by[11]],[by[12],by[13]],[by[14],by[15]]];
  const r32t=advRound(r64);
  const r32=[[r32t[0],r32t[1]],[r32t[2],r32t[3]],[r32t[4],r32t[5]],[r32t[6],r32t[7]]];
  const s16t=advRound(r32);
  const s16=[[s16t[0],s16t[1]],[s16t[2],s16t[3]]];
  const e8t=advRound(s16);
  const e8=[[e8t[0],e8t[1]]];
  const f4=advRound(e8)[0];
  return{r64,r32,r32t,s16,s16t,e8,e8t,f4};
}

          <span style="font-size:9px;color:var(--hint)">${t.reg} ${t.s}</span>
        </div>
        <div class="tr-num">${fm(t.p)}</div>
        <div class="tr-num" style="color:${ev.realized>0?'var(--green)':'var(--muted)'}">${ev.realized>0?fm(ev.realized):'—'}</div>
        <div class="tr-num" style="color:${fc(ev.realized-t.p)}">${fm(ev.realized-t.p,true)}</div>
        <div class="tr-num" style="color:${ev.rem>0?'var(--blue)':'var(--muted)'}">${ev.rem>0?fm(ev.rem):'—'}</div>
      </div>`;
    }).join('');

    h+=`<div class="oc">
      <div class="och">
        <div class="oci" style="background:${c}">${s.o[0]}</div>
        <div>
          <div class="ocn">${s.o}</div>
          <div class="ocsub">${teams.length} teams · ${teams.filter(t=>!t.st.eliminated).length} alive</div>
        </div>
        <div class="ocrk ${rkc}">#${rk}</div>
      </div>
      <div class="ost">
        <div class="osi osi-spacer"></div>
        <div class="osi"><div class="osv cm">${fm(s.inv)}</div><div class="osl">Invested</div></div>
        <div class="osi"><div class="osv" style="color:${s.real>0?'var(--green)':'var(--muted)'}">${fm(s.real)}</div><div class="osl">Realized</div></div>
        <div class="osi"><div class="osv" style="color:${fc(s.net)}">${fm(s.net,true)}</div><div class="osl">Net Profit</div></div>
        <div class="osi"><div class="osv" style="color:var(--blue)">${fm(s.rem)}</div><div class="osl">Projected Remaining Value</div></div>
      </div>
      <div class="team-rows">
        <div class="tr-header">
          <div class="tr-name-h">Team</div>
          <div class="tr-num-h">Invested</div>
          <div class="tr-num-h">Realized</div>
          <div class="tr-num-h">Net Profit</div>
          <div class="tr-num-h">Proj. Remaining</div>
        </div>
        ${trows}
      </div>
    </div>`;
  });

  document.getElementById('lbody').innerHTML=h;
}

// ═══ SUMMARY ═══
function renderSum(){
  document.getElementById('ss-g').textContent=`${gDone}/63`;
  const hasLive=Object.values(W).some(w=>w.live);
  document.getElementById('live-dot').className=hasLive?'on':'';
  document.getElementById('live-label').textContent=hasLive?'LIVE':'Updated';
  document.getElementById('upd').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

// ═══ TABS ═══
function sw(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.className='tab'+((['b','l'][i]===name)?' on':''));
  document.getElementById('bview').hidden=name!=='b';
  document.getElementById('lview').hidden=name!=='l';
}

// ═══ TOAST ═══
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200)}

// ═══ REFRESH ═══
async function refresh(){
  document.getElementById('refbtn').textContent='↻ LOADING…';
  try{await fetchESPN();renderAll();toast('Updated')}
  catch(e){toast('ESPN error');renderAll();}
  document.getElementById('refbtn').textContent='↻ REFRESH';
}

function renderAll(){renderBracket();renderLB();renderSum()}

// ═══ INIT ═══
async function init(){
  try{await fetchESPN()}catch(e){console.error(e)}
  renderAll();
  document.getElementById('loading').style.display='none';
  setInterval(refresh,3*60*1000);
}
init();
</script>
</body>
</html>
